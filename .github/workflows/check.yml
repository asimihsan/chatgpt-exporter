name: Check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  check:
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3

      - run: bun install

      - name: Lint (strict)
        run: bun run lint

      - name: Test
        run: bun run test
