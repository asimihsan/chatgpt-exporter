name: Check

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master

jobs:
  check:
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    env:
      USERSCRIPT_GITHUB_REPO: ${{ github.repository }}
      USERSCRIPT_GITHUB_BRANCH: ${{ github.ref_name }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@v3

      - name: Cache Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: CI
        run: mise run ci
