name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    env:
      USERSCRIPT_GITHUB_REPO: ${{ github.repository }}
      USERSCRIPT_GITHUB_BRANCH: master
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream licensing baseline
        run: |
          git remote add upstream https://github.com/pionxzh/chatgpt-exporter.git
          git fetch --no-tags upstream master

      - uses: jdx/mise-action@v3

      - name: Cache Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('bun.lock', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Release master userscript
        env:
          EVENT_SHA: ${{ github.sha }}
          MAX_ATTEMPTS: "8"
          RELEASE_BRANCH: master
          TAG_PREFIX: userscript-v
          TAG_REMOTE: origin
        run: bash scripts/release/run-master-release.sh
