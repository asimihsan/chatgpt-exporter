name: Publish Userscript Release

on:
  push:
    tags:
      - userscript-v*

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          USERSCRIPT_TAG_NAME: ${{ github.ref_name }}
        run: bash scripts/release/publish-github-release.sh
